<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Clínica Vida Saudável</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="imagex/png" href="imagens/icone.png">
</head>

<body>
    <header>
        <div class="container">
            <img src="imagens/icone.png" alt="Logo da Clínica">
            <h1>Clínica Vida Saudável</h1>
        </div>
        <nav>
            <a href="index.html">Início</a>
            <a href="sobre.html">Sobre</a>
            <a href="contato.html">Contato</a>
        </nav>

    </header>

    <main>
        <section class="consulta container">
            <h3>Agende sua Consulta</h3>
            <form id="consultaForm" class="agendamento-form">
                <div class="form-row">
                    <input type="text" id="nome" placeholder="Nome completo" required>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-row">
                    <input type="tel" id="telefone" placeholder="Telefone" required>
                    <select id="especialidade" required>
                        <option value="" disabled selected>Selecione a especialidade</option>
                        <option value="Clinica-Geral">Clínica Geral</option>
                        <option value="Pediatria">Pediatria</option>
                        <option value="Cardiologia">Cardiologia</option>
                        <option value="Dermatologia">Dermatologia</option>
                        <option value="Ortopedia">Ortopedia</option>
                        <option value="Odontologia">Odontologia</option>
                        <option value="Neurologia">Neurologia</option>
                        <option value="Psicologia">Psicologia</option>
                    </select>
                </div>
                <div class="form-row">
                    <input type="date" id="data" required>
                    <input type="time" id="hora" required>
                </div>
                <textarea id="mensagem" placeholder="Mensagem opcional"></textarea>
                <button type="submit" class="btn">Agendar Consulta</button>
            </form>
        </section>

    </main>

    <footer>
        <p>© 2025 Clínica Vida Saudável - Todos os direitos reservados</p>
    </footer>
    <script src="consulta.js"></script>
</body>

</html>
